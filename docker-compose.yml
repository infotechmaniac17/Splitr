services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 15
  # ---------------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: splitr
      POSTGRES_PASSWORD: splitr
      POSTGRES_DB: splitr
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U splitr -d splitr"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Backend (FastAPI + Uvicorn)
  # Uncomment once backend image / Dockerfile is ready.
  # ---------------------------------------------------------------------------
  # backend:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   env_file: ./backend/.env
  #   ports:
  #     - "8000:8000"
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   volumes:
  #     - ./backend:/app
  #   command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
  #   restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Celery worker
  # Uncomment once backend image is ready.
  # ---------------------------------------------------------------------------
  # celery:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   env_file: ./backend/.env
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   volumes:
  #     - ./backend:/app
  #   command: celery -A app.worker worker --loglevel=info --concurrency=4
  #   restart: unless-stopped

volumes:
  pgdata:
  redisdata:
