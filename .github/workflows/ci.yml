name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Cancel superseded runs on the same branch/PR so failures surface fast and
# we don't burn CI minutes on stale pushes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  # ===========================================================================
  # Backend — FastAPI / SQLAlchemy / Alembic / pytest
  # ===========================================================================
  backend:
    name: Backend (lint, typecheck, alembic sync, pytest x2)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Matches docker-compose.yml's `db` service (postgres:15-alpine, user/pass
    # `splitr`, port 5435 on the host) and CLAUDE.md's documented Postgres-tier
    # test invocation. Database name is `splitr_test` per CLAUDE.md, not the
    # dev `splitr` DB.
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: splitr
          POSTGRES_PASSWORD: splitr
          POSTGRES_DB: splitr_test
        ports:
          - 5435:5432
        options: >-
          --health-cmd "pg_isready -U splitr -d splitr_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      # Both alembic (via app.config.settings) and scripts/check_alembic_sync.py
      # read DATABASE_URL. Point it at the same Postgres service container used
      # for the Postgres-tier pytest run below.
      DATABASE_URL: postgresql+psycopg://splitr:splitr@localhost:5435/splitr_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key-not-for-production

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"

      - name: Wait for Postgres to be ready
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -p 5435 -U splitr -d splitr_test && break
            sleep 2
          done

      - name: Alembic upgrade head
        run: alembic upgrade head

      # THE POINT of this job: guard against alembic_version being stamped
      # while the ORM-model tables are missing/drifted (real incident — a
      # migration path bypassed Alembic and orphaned alembic_version). A
      # non-zero exit here must fail the job.
      - name: Check Alembic/ORM schema sync (drift guard)
        run: python scripts/check_alembic_sync.py

      - name: Run pytest — SQLite tier
        run: pytest
        env:
          # Explicitly unset so this tier never accidentally talks to Postgres.
          TEST_DATABASE_URL: ""

      - name: Run pytest — Postgres tier
        run: pytest --tb=short
        env:
          TEST_DATABASE_URL: postgresql+psycopg://splitr:splitr@localhost:5435/splitr_test

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy strict — app/domain/
        run: mypy app/domain/

  # ===========================================================================
  # Web — Next.js + TypeScript
  # ===========================================================================
  web:
    name: Web (typecheck, lint, build)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install workspace dependencies
        run: npm ci

      - name: Typecheck packages/core
        run: npm run typecheck:core

      - name: Typecheck web
        run: npm run typecheck:web

      - name: Lint web
        run: npm run lint:web

      - name: Build web
        run: npm run build:web

  # ===========================================================================
  # Mobile — Expo + TypeScript (no build; Expo doesn't need one for CI)
  # ===========================================================================
  mobile:
    name: Mobile (typecheck, lint)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install workspace dependencies
        run: npm ci

      - name: Typecheck packages/core
        run: npm run typecheck:core

      - name: Typecheck mobile
        run: npm run typecheck:mobile

      - name: Lint mobile
        run: npm run lint:mobile
