# Alembic configuration file.
# Run alembic commands from the backend/ directory:
#   cd backend && alembic upgrade head
#   cd backend && alembic revision --autogenerate -m "description"
#
# The actual database URL is injected in alembic/env.py from app.config,
# so the value below is never used at runtime — it's a placeholder for
# alembic's config parser.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os  # Use os.pathsep

# Placeholder — overridden in env.py via app.config.settings.DATABASE_URL
sqlalchemy.url = postgresql+psycopg://splitr:splitr@localhost:5432/splitr

[post_write_hooks]
# Uncomment to auto-format generated migration files with ruff:
# hooks = ruff
# ruff.type = console_scripts
# ruff.entrypoint = ruff
# ruff.options = --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
